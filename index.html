<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kinky Wochenplan</title>

<style>
:root{
  --bg:#120a12;
  --panel:#1c1220;
  --panel-2:#25172a;
  --text:#f6eaf4;
  --muted:#c9adc5;
  --line:#4a2946;
  --accent:#ff4fa3;
}

body{
  margin:0;
  font-family:Inter, sans-serif;
  background:linear-gradient(180deg,#140b14,#0e0810);
  color:var(--text);
}

.wrap{max-width:1000px;margin:auto;padding:20px;}

h1{margin:0 0 10px;}

.panel{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:16px;
  padding:16px;
  margin-bottom:20px;
}

input, select, button{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--line);
  background:#1a101c;
  color:var(--text);
}

button{cursor:pointer;}

.week-row{
  display:grid;
  grid-template-columns:120px repeat(3,1fr);
  gap:8px;
  margin-bottom:6px;
}

.actions{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-top:10px;}
.output{white-space:pre-wrap;background:#1a101c;padding:10px;border-radius:10px;}

</style>
</head>

<body>
<div class="wrap">

<h1>Wochenplan</h1>

<div class="panel">
<label>Von</label>
<input id="startDate" type="date">

<label>Bis</label>
<input id="endDate" type="date">

<label>Status</label>
<select id="status">
<option>vorgeschlagen</option>
<option>genehmigt</option>
</select>
</div>

<div class="panel" id="week"></div>

<div class="panel">
<input id="taskInput" placeholder="Neue Aufgabe">
<select id="cat">
<option>Wunsch</option>
<option>Aufgabe</option>
<option>Disziplin</option>
</select>
<button onclick="addTask()">Hinzufügen</button>

<div id="tasks"></div>
</div>

<div class="panel">
<div class="output" id="output"></div>
<div class="actions">
<button onclick="generate()">Plan erstellen</button>
<button onclick="copy()">Kopieren</button>
<button onclick="exportICS()">Kalender</button>
<button onclick="reset()">Reset</button>
</div>
</div>

</div>

<script>
const DAYS=["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];

let tasks=JSON.parse(localStorage.getItem("tasks")||"[]");
let week=JSON.parse(localStorage.getItem("week")||"{}");

DAYS.forEach(d=>{if(!week[d])week[d]=["","",""];});

function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
localStorage.setItem("week",JSON.stringify(week));
}

function renderWeek(){
let html="";
DAYS.forEach(day=>{
html+=`<div class="week-row">
<div>${day}</div>
${[0,1,2].map(i=>`
<select onchange="setTask('${day}',${i},this.value)">
<option value="">--</option>
${tasks.map(t=>`<option ${week[day][i]==t.name?"selected":""}>${t.name}</option>`)}
</select>`).join("")}
</div>`;
});
document.getElementById("week").innerHTML=html;
}

function renderTasks(){
document.getElementById("tasks").innerHTML=
tasks.map((t,i)=>`
<div>
${t.name} (${t.category})
<button onclick="del(${i})">X</button>
</div>`).join("");
}

function addTask(){
const name=document.getElementById("taskInput").value;
const cat=document.getElementById("cat").value;
if(!name)return;
tasks.push({name,category:cat});
save();
renderTasks();
renderWeek();
}

function del(i){
tasks.splice(i,1);
save();
renderTasks();
renderWeek();
}

function setTask(day,i,val){
week[day][i]=val;
save();
}

function generate(){
let out="";
DAYS.forEach(d=>{
out+=d+"\n";
week[d].forEach(e=>{if(e)out+="- "+e+"\n"});
out+="\n";
});
document.getElementById("output").textContent=out;
}

function copy(){
navigator.clipboard.writeText(document.getElementById("output").textContent);
}

function reset(){
DAYS.forEach(d=>week[d]=["","",""]);
save();
renderWeek();
}

function exportICS(){
let start=document.getElementById("startDate").value;
if(!start){alert("Startdatum fehlt");return;}

let base=new Date(start);
let ics="BEGIN:VCALENDAR\nVERSION:2.0\n";

DAYS.forEach((d,i)=>{
let date=new Date(base);
date.setDate(base.getDate()+i);
let y=date.getFullYear();
let m=("0"+(date.getMonth()+1)).slice(-2);
let day=("0"+date.getDate()).slice(-2);

week[d].forEach(task=>{
if(!task)return;
ics+="BEGIN:VEVENT\n";
ics+=`DTSTART;VALUE=DATE:${y}${m}${day}\n`;
ics+=`SUMMARY:${task}\n`;
ics+="END:VEVENT\n";
});
});

ics+="END:VCALENDAR";

let blob=new Blob([ics]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="plan.ics";
a.click();
}

renderTasks();
renderWeek();
</script>

</body>
</html>
